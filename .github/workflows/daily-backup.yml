name: Daily Backup to Google Drive

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create ZIP with date
        run: |
          DATE=$(date +%Y-%m-%d)
          zip -r "store_managemant_backup_${DATE}.zip" . \
            --exclude "*.git*" \
            --exclude "node_modules/*"
          echo "BACKUP_FILE=store_managemant_backup_${DATE}.zip" >> $GITHUB_ENV

      - name: Upload to Google Drive
        run: |
          pip install google-api-python-client google-auth --break-system-packages
          python3 << 'EOF'
          import os, json
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          creds_json = os.environ['GDRIVE_CREDENTIALS']
          creds_info = json.loads(creds_json)
          creds = service_account.Credentials.from_service_account_info(
              creds_info,
              scopes=['https://www.googleapis.com/auth/drive']
          )
          service = build('drive', 'v3', credentials=creds)

          folder_id = os.environ['GDRIVE_FOLDER_ID']
          backup_file = os.environ['BACKUP_FILE']

          file_metadata = {
              'name': backup_file,
              'parents': [folder_id]
          }
          media = MediaFileUpload(backup_file, mimetype='application/zip')
          file = service.files().create(
              body=file_metadata,
              media_body=media,
              fields='id, name'
          ).execute()
          print(f"Uploaded: {file.get('name')} with ID: {file.get('id')}")
          EOF
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          BACKUP_FILE: ${{ env.BACKUP_FILE }}

      - name: Delete backups older than 30
        run: |
          python3 << 'EOF'
          import os, json
          from google.oauth2 import service_account
          from googleapiclient.discovery import build

          creds_json = os.environ['GDRIVE_CREDENTIALS']
          creds_info = json.loads(creds_json)
          creds = service_account.Credentials.from_service_account_info(
              creds_info,
              scopes=['https://www.googleapis.com/auth/drive']
          )
          service = build('drive', 'v3', credentials=creds)
          folder_id = os.environ['GDRIVE_FOLDER_ID']

          results = service.files().list(
              q=f"'{folder_id}' in parents and name contains 'store_managemant_backup'",
              fields="files(id, name, createdTime)",
              orderBy="createdTime asc"
          ).execute()

          files = results.get('files', [])
          print(f"Total backups: {len(files)}")

          if len(files) > 30:
              to_delete = files[:len(files) - 30]
              for f in to_delete:
                  service.files().delete(fileId=f['id']).execute()
                  print(f"Deleted: {f['name']}")
          else:
              print("No cleanup needed")
          EOF
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
