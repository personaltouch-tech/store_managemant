name: Daily Backup to Google Drive

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: pip install google-api-python-client google-auth --break-system-packages

      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
          [gdrive]
          type = drive
          scope = drive
          service_account_credentials = $GDRIVE_CREDENTIALS
          root_folder_id = $GDRIVE_FOLDER_ID
          EOF
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}

      - name: Create ZIP with date
        run: |
          DATE=$(date +%Y-%m-%d)
          zip -r "store_managemant_backup_${DATE}.zip" . \
            --exclude "*.git*" \
            --exclude "node_modules/*"
          echo "BACKUP_FILE=store_managemant_backup_${DATE}.zip" >> $GITHUB_ENV

      - name: Upload to Google Drive
        run: rclone copy "$BACKUP_FILE" gdrive:/
        env:
          BACKUP_FILE: ${{ env.BACKUP_FILE }}

      - name: Delete backups older than 30 days
        run: |
          python3 << 'EOF'
          import os, json
          from google.oauth2 import service_account
          from googleapiclient.discovery import build

          creds_info = json.loads(os.environ['GDRIVE_CREDENTIALS'])
          creds = service_account.Credentials.from_service_account_info(
              creds_info,
              scopes=['https://www.googleapis.com/auth/drive']
          )
          service = build('drive', 'v3', credentials=creds)
          folder_id = os.environ['GDRIVE_FOLDER_ID']

          results = service.files().list(
              q=f"'{folder_id}' in parents and name contains 'store_managemant_backup'",
              fields="files(id, name, createdTime)",
              orderBy="createdTime asc",
              supportsAllDrives=True,
              includeItemsFromAllDrives=True
          ).execute()

          files = results.get('files', [])
          print(f"Total backups: {len(files)}")

          if len(files) > 30:
              to_delete = files[:len(files) - 30]
              for f in to_delete:
                  service.files().delete(fileId=f['id']).execute()
                  print(f"Deleted: {f['name']}")
          else:
              print("No cleanup needed")
          EOF
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
